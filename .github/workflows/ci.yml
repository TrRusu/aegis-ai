name: CI/CD

on:
  pull_request:
    branches: ["master"]
  push:
    branches: ["master"]

jobs:
  ci:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Lint — ruff
        run: |
          pip install ruff
          ruff check .

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Test — pytest with coverage
        run: pytest tests/ -v --cov=. --cov-config=.coveragerc --cov-report=term-missing --cov-fail-under=90 || ([ $? -eq 5 ] && exit 0 || exit 1)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

  cd:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for Streamlit deployment
        run: sleep 30

      - name: Verify deployment is live
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-redirs 5 ${{ secrets.STREAMLIT_APP_URL }})
          echo "Streamlit response: $STATUS"
          if [ "$STATUS" = "000" ]; then
            echo "Deployment verification failed — server unreachable"
            exit 1
          fi
          echo "Deployment verified successfully — HTTP $STATUS"

      - name: Create GitHub release tag
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().slice(0, 10).replace(/-/g, '.');
            const run = context.runNumber;
            const tag = `v${date}-${run}`;
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${tag}`,
              sha: context.sha,
            });
            console.log(`Created tag: ${tag}`);
