[pytest]
addopts = --tb=short -v --cov=. --cov-config=.coveragerc --cov-fail-under=90
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    integration: marks tests that hit real external services (NVD API, ChromaDB, MCP, A2A)
    live_api: marks tests that make real OpenAI API calls
